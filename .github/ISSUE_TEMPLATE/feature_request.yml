name: Feature request
description: Propose an improvement to orya-eval.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests aligned with the project's scope: evaluation and regression checking for ML and AI systems.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep it focused on evaluation and regression checking.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What workarounds or other designs did you consider?
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how would this improve day-to-day use?
      placeholder: This would make CI regression checks easier for teams comparing nightly model outputs.
